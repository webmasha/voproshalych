services:
  postgres:
    image: dawsonlp/postgres-batteries-inc:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voproshalych"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
    depends_on:
      postgres:
        condition: service_healthy

  qa-service:
    build:
      context: ./qa-service
      dockerfile: Dockerfile
      secrets:
        - hf_token
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QA_SERVICE_URL: ${QA_SERVICE_URL:-http://qa-service:8004}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot-core:
    build:
      context: .
      dockerfile: bot-service/core/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CORE_APP_NAME: ${BOT_CORE_APP_NAME:-bot-core}
      BOT_CORE_APP_VERSION: ${BOT_CORE_APP_VERSION:-0.1.0}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      qa-service:
        condition: service_healthy

  telegram-bot:
    build:
      context: .
      dockerfile: bot-service/bots/telegram/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CORE_URL: ${BOT_CORE_URL:-http://bot-core:8000}
      BOT_CORE_TIMEOUT_SECONDS: ${BOT_CORE_TIMEOUT_SECONDS:-10}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      bot-core:
        condition: service_healthy

  vk-bot:
    build:
      context: .
      dockerfile: bot-service/bots/vk/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CORE_URL: ${BOT_CORE_URL:-http://bot-core:8000}
      BOT_CORE_TIMEOUT_SECONDS: ${BOT_CORE_TIMEOUT_SECONDS:-10}
      VK_BOT_TOKEN: ${VK_BOT_TOKEN}
    depends_on:
      bot-core:
        condition: service_healthy

  max-bot:
    build:
      context: .
      dockerfile: bot-service/bots/max/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CORE_URL: ${BOT_CORE_URL:-http://bot-core:8000}
      BOT_CORE_TIMEOUT_SECONDS: ${BOT_CORE_TIMEOUT_SECONDS:-10}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
    depends_on:
      bot-core:
        condition: service_healthy

volumes:
  postgres_data:

secrets:
  hf_token:
    environment: HF_TOKEN
